title: IlDavi
description: "Pentesting, red team, awareness. Contenuti tecnici per chi vuole capire davvero — dal principiante al professionista."
tagline: "Sicurezza informatica.<br><span class='hl'>Senza filtri.</span>"
baseurl: ""
url: "https://iidavi.github.io"

author:
  name: IlDavi

# Build
theme: null
plugins:
  - jekyll-feed
  - jekyll-sitemap

# Permalinks
permalink: /:categories/:title/

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor

# Markdown
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
