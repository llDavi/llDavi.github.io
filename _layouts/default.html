<!DOCTYPE html>
<html lang="{{ page.lang | default: 'it' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% elsif page.description %}{{ page.description | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>

  <nav class="site-nav">
    <a href="{{ '/' | relative_url }}" class="nav-logo">
      <span class="bracket">[</span>{{ site.title }}<span class="bracket">]</span>
    </a>

    <div class="nav-right">
      <ul class="nav-links">
        <li>
          <a href="{% if page.lang == 'en' %}{{ '/en/' | relative_url }}{% elsif page.lang == 'es' %}{{ '/es/' | relative_url }}{% else %}{{ '/' | relative_url }}{% endif %}"
             {% if page.url == '/' or page.url == '/en/' or page.url == '/es/' %}class="active"{% endif %}>
            ~/blog
          </a>
        </li>
        <li>
          <a href="{% if page.lang == 'en' %}{{ '/en/about/' | relative_url }}{% elsif page.lang == 'es' %}{{ '/es/about/' | relative_url }}{% else %}{{ '/about/' | relative_url }}{% endif %}"
             {% if page.url contains 'about' %}class="active"{% endif %}>
            ~/about
          </a>
        </li>
      </ul>

      <div class="lang-switch">
        <a href="{{ '/' | relative_url }}" {% if page.lang == 'it' or page.lang == nil %}class="active"{% endif %}>IT</a>
        <a href="{{ '/en/' | relative_url }}" {% if page.lang == 'en' %}class="active"{% endif %}>EN</a>
        <a href="{{ '/es/' | relative_url }}" {% if page.lang == 'es' %}class="active"{% endif %}>ES</a>
      </div>
    </div>
  </nav>

  <main class="page-wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <span><span class="footer-accent">$</span> {{ site.title }} · {% if page.description %}{{ page.description | strip_html | truncate: 80 }}{% else %}{{ site.description }}{% endif %}</span>
    <span>built with <span class="footer-accent">Jekyll</span> + <span class="footer-accent">GitHub Pages</span></span>
  </footer>

</body>
</html>
